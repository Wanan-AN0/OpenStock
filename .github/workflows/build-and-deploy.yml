name: Build and Deploy to Docker

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openstock

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_FINNHUB_API_KEY=${{ vars.NEXT_PUBLIC_FINNHUB_API_KEY || 'demo' }}
            NEXT_PUBLIC_BASE_PATH=
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify local server to pull (optional webhook)
        env:
          DEPLOY_WEBHOOK_URL: ${{ vars.DEPLOY_WEBHOOK_URL }}
        if: vars.DEPLOY_WEBHOOK_URL != ''
        run: |
          echo "Triggering deployment on local server..."
          curl -X POST "${{ vars.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"image":"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}","tag":"latest","branch":"${{ github.ref_name }}","commit":"${{ github.sha }}"}' \
            --max-time 30 || echo "Webhook call failed (local server may be unreachable)"
