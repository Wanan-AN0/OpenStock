# Production: pull pre-built image from GHCR
# Start with: docker compose -f docker-compose.prod.yml up -d
services:
  openstock:
    image: ghcr.io/wanan-an0/openstock:latest
    ports:
      - "3001:3000"
    env_file:
      - .env
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_BASE_PATH=
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
